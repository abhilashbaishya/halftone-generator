<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="workspace">
      <aside class="control-rail">
        <section class="control-group">
          <div class="group-head">
            <h2>Source</h2>
          </div>
          <label class="field file-field" for="imageInput">
            <span>Upload Image</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Preset</span>
            </div>
            <select id="presetSelect"></select>
          </label>
          <div class="field split preset-actions">
            <button id="savePresetBtn" class="button button-small" type="button">Save Preset</button>
            <button id="deletePresetBtn" class="button button-small" type="button">Delete Preset</button>
          </div>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Layout</h2>
          </div>
          <label class="field">
            <div class="field-title">
              <span>Cell Size</span>
              <output id="cellSizeOut">8 px</output>
            </div>
            <input id="cellSize" type="range" min="3" max="20" value="8" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Screen Angle</span>
              <output id="angleOut">28 deg</output>
            </div>
            <input id="screenAngle" type="range" min="-75" max="75" value="28" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Dot Jitter</span>
              <output id="jitterOut">10%</output>
            </div>
            <input id="jitter" type="range" min="0" max="100" value="10" />
          </label>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Tone</h2>
          </div>
          <label class="field">
            <div class="field-title">
              <span>Quality</span>
            </div>
            <select id="quality">
              <option value="draft">Draft</option>
              <option value="high" selected>High</option>
              <option value="ultra">Ultra</option>
            </select>
          </label>
          <label class="field">
            <div class="field-title">
              <span>Contrast</span>
              <output id="contrastOut">1.10</output>
            </div>
            <input id="contrast" type="range" min="0.5" max="2.5" step="0.05" value="1.1" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Gamma</span>
              <output id="gammaOut">1.00</output>
            </div>
            <input id="gamma" type="range" min="0.4" max="2.4" step="0.05" value="1" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Tone Curve</span>
              <output id="toneCurveOut">0.88</output>
            </div>
            <input id="toneCurve" type="range" min="0.45" max="2.2" step="0.01" value="0.88" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Minimum Dot</span>
              <output id="minDotOut">0%</output>
            </div>
            <input id="minDot" type="range" min="0" max="60" value="0" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Micro Dot Layer</span>
              <output id="microDotOut">40%</output>
            </div>
            <input id="microDot" type="range" min="0" max="100" value="40" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Random Seed</span>
              <output id="seedOut">0</output>
            </div>
            <input id="seed" type="range" min="0" max="9999" step="1" value="0" />
          </label>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Colors</h2>
          </div>
          <div class="field split">
            <label>
              <span>Ink</span>
              <input id="inkColor" type="color" value="#111111" />
            </label>
            <label>
              <span>Paper</span>
              <input id="paperColor" type="color" value="#f5f5f5" />
            </label>
          </div>
        </section>

        <div class="rail-actions">
          <button id="regenerateBtn" class="button">Regenerate</button>
          <button id="exportBtn" class="button button-primary">Export PNG</button>
        </div>
      </aside>

      <section class="preview-stage">
        <div class="preview-toolbar">
          <label class="zoom-control" for="zoomRange">
            <span>Zoom</span>
            <output id="zoomOut">100%</output>
          </label>
          <input id="zoomRange" type="range" min="0.5" max="4" step="0.05" value="1" />
          <button id="resetViewBtn" class="button button-small" type="button">Reset View</button>
          <p id="renderStatus" class="render-status" aria-live="polite">Idle</p>
        </div>
        <div class="canvas-wrap" id="compareStage">
          <div class="canvas-plane" id="canvasPlane">
            <canvas id="sourceCanvas" width="1200" height="800"></canvas>
            <div class="halftone-overlay" id="halftoneOverlay">
              <canvas id="previewCanvas" width="1200" height="800"></canvas>
            </div>
          </div>
          <button
            id="splitHandle"
            class="split-handle"
            type="button"
            aria-label="Adjust split preview"
            title="Drag to compare source and halftone"
          >
            <svg class="split-arrows" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M5 3L1 8L5 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11 3L15 8L11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
