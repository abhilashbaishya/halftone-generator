<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browser-based halftone image generator with real-time preview, presets, and PNG export." />
    <title>Halftone Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="sr-only">Halftone Studio</h1>
    <main class="workspace">
      <aside class="control-rail">
        <section class="control-group">
          <div class="group-head">
            <h2>Source</h2>
          </div>
          <label class="field file-field" for="imageInput">
            <span>Upload Image</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Preset</span>
            </div>
            <select id="presetSelect"></select>
          </label>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Layout</h2>
          </div>
          <label class="field">
            <div class="field-title">
              <span>Cell Size</span>
              <output id="cellSizeOut">8 px</output>
            </div>
            <input id="cellSize" type="range" min="3" max="20" value="8" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Screen Angle</span>
              <output id="angleOut">28 deg</output>
            </div>
            <input id="screenAngle" type="range" min="-75" max="75" value="28" />
          </label>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Tone</h2>
          </div>
          <label class="field">
            <div class="field-title">
              <span>Quality</span>
            </div>
            <select id="quality">
              <option value="draft">Draft</option>
              <option value="high" selected>High</option>
              <option value="ultra">Ultra</option>
              <option value="print">Print</option>
            </select>
          </label>
          <label class="field">
            <div class="field-title">
              <span>Contrast</span>
              <output id="contrastOut">1.10</output>
            </div>
            <input id="contrast" type="range" min="0.5" max="2.5" step="0.05" value="1.1" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Gamma</span>
              <output id="gammaOut">1.00</output>
            </div>
            <input id="gamma" type="range" min="0.4" max="2.4" step="0.05" value="1" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Tone Curve</span>
              <output id="toneCurveOut">0.88</output>
            </div>
            <input id="toneCurve" type="range" min="0.45" max="2.2" step="0.01" value="0.88" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Minimum Dot</span>
              <output id="minDotOut">0%</output>
            </div>
            <input id="minDot" type="range" min="0" max="60" value="0" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Grain</span>
              <output id="grainOut">0%</output>
            </div>
            <input id="grainStrength" type="range" min="0" max="100" step="1" value="0" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>Bloom</span>
              <output id="bloomOut">0%</output>
            </div>
            <input id="bloomStrength" type="range" min="0" max="100" step="1" value="0" />
          </label>
          <label class="field">
            <div class="field-title">
              <span>CRT</span>
              <output id="crtOut">0%</output>
            </div>
            <input id="crtStrength" type="range" min="0" max="100" step="1" value="0" />
          </label>
        </section>

        <section class="control-group">
          <div class="group-head">
            <h2>Colors</h2>
          </div>
          <div class="field split">
            <label>
              <span>Ink</span>
              <input id="inkColor" type="color" value="#111111" />
            </label>
            <label>
              <span>Paper</span>
              <input id="paperColor" type="color" value="#f5f5f5" />
            </label>
          </div>
        </section>

        <div class="rail-actions">
          <button id="regenerateBtn" class="button">Regenerate</button>
          <button id="exportBtn" class="button button-primary">Export PNG</button>
        </div>
      </aside>

      <section class="preview-stage">
        <div class="preview-toolbar">
          <label class="zoom-control" for="zoomRange">
            <span>Zoom</span>
            <output id="zoomOut">100%</output>
          </label>
          <input id="zoomRange" type="range" min="0.5" max="4" step="0.05" value="1" />
          <button id="resetViewBtn" class="button button-small" type="button">Reset View</button>
          <button id="themeToggle" class="button button-small theme-toggle" type="button" aria-label="Switch to light mode">
            <svg id="iconSun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <circle cx="8" cy="8" r="3"/>
              <line x1="8" y1="1" x2="8" y2="2.5"/>
              <line x1="8" y1="13.5" x2="8" y2="15"/>
              <line x1="1" y1="8" x2="2.5" y2="8"/>
              <line x1="13.5" y1="8" x2="15" y2="8"/>
              <line x1="3.05" y1="3.05" x2="4.1" y2="4.1"/>
              <line x1="11.9" y1="11.9" x2="12.95" y2="12.95"/>
              <line x1="12.95" y1="3.05" x2="11.9" y2="4.1"/>
              <line x1="4.1" y1="11.9" x2="3.05" y2="12.95"/>
            </svg>
            <svg id="iconMoon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" style="display:none">
              <path d="M13.5 10A6 6 0 0 1 6 2.5a6 6 0 1 0 7.5 7.5z"/>
            </svg>
          </button>
          <p id="renderStatus" class="render-status" aria-live="polite">Idle</p>
        </div>
        <div class="canvas-wrap" id="compareStage">
          <div class="canvas-plane" id="canvasPlane">
            <canvas id="sourceCanvas" width="1200" height="800" aria-label="Source image"></canvas>
            <div class="halftone-overlay" id="halftoneOverlay">
              <canvas id="previewCanvas" width="1200" height="800" aria-label="Halftone preview"></canvas>
            </div>
          </div>
          <button
            id="splitHandle"
            class="split-handle"
            type="button"
            aria-label="Adjust split preview"
            title="Drag to compare source and halftone"
          >
            <svg class="split-arrows" width="20" height="20" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 22L28 16L22 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 22L4 16L10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>
    </main>

    <script src="grain-pass.js"></script>
    <script src="bloom-pass.js"></script>
    <script src="crt-pass.js"></script>
    <script src="script.js"></script>
  </body>
</html>
